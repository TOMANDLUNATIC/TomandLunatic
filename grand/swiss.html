<style>
/* 🔥 CENTER FRAME */
.swiss-wrapper {
    width: 95%;
    max-width: 1100px;
    margin-top: 50px;

    border-radius: 20px;
    overflow: hidden;

    border: 1px solid rgba(255,215,0,0.3);

    box-shadow:
        0 0 30px rgba(255,140,0,0.2),
        0 20px 60px rgba(0,0,0,0.8);

    position: relative;
}

/* ✨ GOLD SWIPE (same theme) */
.swiss-wrapper::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;

    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,215,0,0.3),
        transparent
    );

    top: -100%;
    left: -100%;
    transform: rotate(25deg);
    transition: 0.8s;
}

.swiss-wrapper:hover::before {
    top: 100%;
    left: 100%;
}

/* 📺 IFRAME */
.swiss-wrapper iframe {
    width: 100%;
    height: 600px;
    border: none;
}

/* 📱 MOBILE */
@media (max-width: 768px) {
    .swiss-wrapper iframe {
        height: 300px;
    }
}
</style>

</head>

        allowfullscreen>

</div>
